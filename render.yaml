services:
  # PostgreSQL Database
  - type: pserv
    name: syncveil-postgres
    env: docker
    plan: free
    ipAllowList: []
  
  # Backend API
  - type: web
    name: syncveil-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        value: https://syncveil.software,https://www.syncveil.software,https://syncveil-website.onrender.com
      - key: FRONTEND_URL
        value: https://syncveil.software
      
      # PostgreSQL Database (REQUIRED)
      - key: DATABASE_URL
        fromDatabase:
          name: syncveil-postgres
          property: connectionString
      
      # JWT Authentication (REQUIRED - must be 32+ characters)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      
      # MongoDB (REQUIRED for OTP storage and data features)
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: syncveil
      
      # Email Service (REQUIRED for email verification)
      - key: EMAIL_ENABLED
        value: true
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: SyncVeil
      
      # OTP Configuration
      - key: OTP_LENGTH
        value: 6
      - key: OTP_EXPIRE_MINUTES
        value: 10
      - key: OTP_MAX_ATTEMPTS
        value: 3
      
      # Email Verification Settings
      - key: EMAIL_VERIFICATION_REQUIRED
        value: true
      - key: EMAIL_VERIFICATION_EXPIRE_HOURS
        value: 24
      
      # Security
      - key: PASSWORD_HASH_TIME_COST
        value: 2
      - key: PASSWORD_HASH_MEMORY_COST
        value: 65536
      - key: PASSWORD_HASH_PARALLELISM
        value: 1
      
      # Logging
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: syncveil-website
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_API_URL
        value: https://syncveil-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
